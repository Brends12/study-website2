<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeStudy AI | v3 Reliable</title>
    <script src="https://puter.com"></script>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        .flashcard { perspective: 1000px; min-height: 200px; }
        .flashcard-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; height: 100%; width: 100%; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; padding: 1.5rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; text-align: center; }
        .front { background: white; border: 2px solid #e2e8f0; }
        .back { transform: rotateY(180deg); background: #2563eb; color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <nav class="bg-white border-b px-6 py-4 flex items-center gap-2 sticky top-0 z-50">
        <div class="bg-blue-600 p-1.5 rounded text-white"><i data-lucide="graduation-cap" class="w-5 h-5"></i></div>
        <span class="text-xl font-bold">TubeStudy AI</span>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-12">
        <div class="bg-white p-4 rounded-2xl shadow-xl border flex flex-col md:flex-row gap-3 mb-12">
            <input id="ytUrl" type="text" placeholder="Paste YouTube link here..." class="flex-1 p-4 outline-none text-lg rounded-xl bg-slate-50">
            <button onclick="processVideo()" id="generateBtn" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                Analyze <i data-lucide="zap" class="w-4 h-4"></i>
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
            <p class="font-medium text-slate-600">Reading video transcript... this takes 10-20 seconds.</p>
        </div>

        <div id="output" class="hidden space-y-12">
            <div id="flashcardsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            <div class="bg-slate-900 rounded-3xl p-8 text-white shadow-2xl">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="clipboard-check" class="text-blue-400"></i> Practice Quiz</h3>
                <div id="testArea" class="space-y-8"></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        async function processVideo() {
            const url = document.getElementById('ytUrl').value;
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');

            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                return alert("Please paste a valid YouTube link.");
            }

            btn.disabled = true;
            loading.classList.remove('hidden');
            output.classList.add('hidden');

            try {
                // Get Video ID
                const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                
                // Fetch Transcript - Using a more stable mirror
                const res = await fetch(`https://vercel.app{vid}`);
                if (!res.ok) throw new Error("Transcript not available for this video.");
                
                const data = await res.json();
                const text = data.transcript.map(t => t.text).join(' ').substring(0, 4000);

                // Use Puter.js AI with gpt-4o-mini (latest)
                const prompt = `Based on this text, create exactly 4 flashcards and 2 quiz questions. Return ONLY a JSON object: 
                {"cards": [{"q": "Question", "a": "Answer"}], "test": [{"q": "Question", "options": ["A", "B", "C", "D"], "correct": "CorrectChoice"}]}
                Text: ${text}`;

                const aiResponse = await puter.ai.chat(prompt, { model: 'gpt-4o-mini' });
                const cleanJson = aiResponse.message.content.replace(/```json|```/g, "").trim();
                const studyData = JSON.parse(cleanJson);

                renderContent(studyData);
            } catch (err) {
                console.error(err);
                alert("Processing Failed! Check if the video is Public and has Captions (CC) enabled.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
                lucide.createIcons();
            }
        }

        function renderContent(data) {
            const grid = document.getElementById('flashcardsGrid');
            const area = document.getElementById('testArea');

            grid.innerHTML = data.cards.map(c => `
                <div class="flashcard" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="front shadow-sm font-semibold">${c.q}</div>
                        <div class="back text-sm font-medium px-4">${c.a}</div>
                    </div>
                </div>
            `).join('');

            area.innerHTML = data.test.map((t, i) => `
                <div>
                    <p class="text-lg mb-4 text-slate-300 font-medium">${i+1}. ${t.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${t.options.map(opt => `
                            <button onclick="checkAnswer(this, '${opt}', '${t.correct}')" 
                                class="text-left p-4 rounded-xl border border-slate-700 bg-slate-800/40 hover:bg-slate-700 transition text-slate-200">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('output').classList.remove('hidden');
        }

        function checkAnswer(btn, pick, correct) {
            btn.className = pick === correct 
                ? "text-left p-4 rounded-xl border border-green-500 bg-green-500/20 text-green-400"
                : "text-left p-4 rounded-xl border border-red-500 bg-red-500/20 text-red-400";
        }
    </script>
</body>
</html>
