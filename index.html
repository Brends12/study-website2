<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeStudy - Free Video Flashcards</title>
    <!-- Puter.js provides the AI brain for free -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b p-4 text-center">
        <h1 class="text-2xl font-bold text-blue-600">TubeStudy</h1>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-8 rounded-xl shadow-sm border mb-8">
            <h2 class="text-xl font-semibold mb-4">1. Paste YouTube Link</h2>
            <p class="text-sm text-gray-500 mb-4">No API key required. We use Puter AI to generate your study materials.</p>
            <div class="flex gap-2">
                <input id="ytUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." 
                       class="flex-1 border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="processVideo()" id="generateBtn" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    Create Study Guide
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600 italic">Reading video transcript and generating cards...</p>
        </div>

        <div id="output" class="hidden space-y-8">
            <section>
                <h2 class="text-2xl font-bold mb-4">Flashcards</h2>
                <div id="flashcardsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
            
            <section>
                <h2 class="text-2xl font-bold mb-4">Quick Test</h2>
                <div id="testArea" class="space-y-4 bg-white p-6 rounded-xl border"></div>
            </section>
        </div>
    </main>

    <script>
        async function processVideo() {
            const url = document.getElementById('ytUrl').value;
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');

            if (!url) return alert("Please enter a YouTube URL");

            btn.disabled = true;
            loading.classList.remove('hidden');
            output.classList.add('hidden');

            try {
                // Step 1: Extract Video ID
                const videoId = url.split('v=')[1]?.split('&')[0];
                if(!videoId) throw new Error("Invalid URL");

                // Step 2: Fetch Transcript via Proxy
                const transcriptRes = await fetch(`https://vercel.app{videoId}`);
                const transcriptData = await transcriptRes.json();
                const fullText = transcriptData.transcript.map(t => t.text).join(' ').substring(0, 3000);

                // Step 3: Use Puter.js AI Brain
                const prompt = `Based on this text, create 4 flashcards and 2 quiz questions.
                Return ONLY a JSON object exactly like this:
                { 
                  "cards": [{"q": "Question here", "a": "Answer here"}], 
                  "test": [{"q": "Question here", "options": ["Choice1", "Choice2", "Choice3", "Choice4"], "correct": "Choice1"}] 
                }
                
                Text: ${fullText}`;
                
                const response = await puter.ai.chat(prompt);
                
                // Clean the response in case AI includes backticks
                const cleanJson = response.message.content.replace(/```json|```/g, "").trim();
                const studyData = JSON.parse(cleanJson);

                renderResults(studyData);
            } catch (err) {
                console.error(err);
                alert("Error! This usually happens if the video has captions disabled or the AI is busy.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }

        function renderResults(data) {
            const flashcardGrid = document.getElementById('flashcardsGrid');
            const testArea = document.getElementById('testArea');
            const output = document.getElementById('output');

            flashcardGrid.innerHTML = data.cards.map(card => `
                <div class="bg-white p-6 rounded-xl border shadow-sm cursor-pointer hover:border-blue-400 transition" onclick="this.querySelector('.ans').classList.toggle('hidden')">
                    <p class="font-bold text-sm text-blue-600 mb-2 uppercase">Question</p>
                    <p class="text-lg mb-4">${card.q}</p>
                    <div class="ans hidden border-t pt-4">
                        <p class="font-bold text-sm text-green-600 mb-1 uppercase">Answer</p>
                        <p>${card.a}</p>
                    </div>
                </div>
            `).join('');

            testArea.innerHTML = data.test.map((item, idx) => `
                <div class="p-4 border-b last:border-0">
                    <p class="font-bold mb-3">${idx+1}. ${item.q}</p>
                    <div class="grid grid-cols-1 gap-2">
                        ${item.options.map(opt => `
                            <button onclick="this.style.background = '${opt === item.correct ? '#dcfce7' : '#fee2e2'}'" 
                                    class="text-left p-2 border rounded hover:bg-gray-50 transition">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            output.classList.remove('hidden');
        }
    </script>
</body>
</html>
